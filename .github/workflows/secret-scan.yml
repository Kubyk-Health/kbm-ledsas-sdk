name: Secret scan

# Defense-in-depth secret scanning on every push and PR, in addition to
# GitHub's native secret scanning + push protection (enabled in repo settings).
# Both tools run as CLIs/containers so no paid action license is required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir /repo --config /repo/.gitleaks.toml --redact -v

  trufflehog:
    name: trufflehog (verified only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan filesystem (fail only on verified secrets)
        # Pinned official image (mirrors the gitleaks job) instead of piping
        # an install script from an unpinned branch into a shell.
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/trufflesecurity/trufflehog:3.95.9 \
            filesystem /repo --only-verified --fail --no-update
