name: Secret scan

# Defense-in-depth secret scanning on every push and PR, in addition to
# GitHub's native secret scanning + push protection (enabled in repo settings).
# Both tools run as CLIs/containers so no paid action license is required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir /repo --config /repo/.gitleaks.toml --redact -v

  trufflehog:
    name: trufflehog (verified only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan filesystem (fail only on verified secrets)
        run: trufflehog filesystem . --only-verified --fail --no-update
