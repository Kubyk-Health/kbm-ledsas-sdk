name: Release

# Two ways to run:
#   1. Publish a GitHub Release  -> builds, publishes to PyPI, attaches the
#      sdist + wheel to the Release.
#   2. Run manually (workflow_dispatch) -> builds and publishes to TestPyPI only
#      (a dry-run to rehearse the OIDC publish flow before a real release).
#
# Both use PyPI Trusted Publishing (OIDC) — NO API token is stored in the repo.
# One-time setup:
#   - PyPI:     add a pending publisher for this repo + workflow, env "pypi".
#   - TestPyPI: add a pending publisher on test.pypi.org, env "testpypi".

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::pyproject version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
      - name: Check metadata
        run: |
          python -m pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/kbm-ledsas-sdk/
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/kbm-ledsas-sdk/
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  attach-release-assets:
    name: Attach dist to GitHub Release
    if: github.event_name == 'release'
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write        # required to upload assets to the Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Upload sdist + wheel to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber --repo "${{ github.repository }}"
