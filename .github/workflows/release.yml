name: Release

# Two ways to run:
#   1. Publish a GitHub Release  -> builds, publishes to PyPI, attaches the
#      sdist + wheel to the Release.
#   2. Run manually (workflow_dispatch) -> builds and publishes to TestPyPI only
#      (a dry-run to rehearse the OIDC publish flow before a real release).
#
# Both use PyPI Trusted Publishing (OIDC) — NO API token is stored in the repo.
# One-time setup:
#   - PyPI:     add a pending publisher for this repo + workflow, env "pypi".
#   - TestPyPI: add a pending publisher on test.pypi.org, env "testpypi".

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::pyproject version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
      - name: Check metadata
        run: |
          python -m pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/kbm-ledsas-sdk/
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/kbm-ledsas-sdk/
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  attach-release-assets:
    name: Attach dist + SBOM to GitHub Release
    if: github.event_name == 'release'
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write        # required to upload assets to the Release
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Upload sdist + wheel to the Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" dist/* --clobber --repo "${{ github.repository }}"

      # CycloneDX SBOM: generated AFTER the wheel/sdist are already attached, so
      # a hypothetical SBOM failure never blocks the core release assets.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Generate CycloneDX SBOM from the built wheel
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Resolve the wheel's runtime dependency closure in a clean venv, drop
          # the venv seed tooling (pip/setuptools/wheel — not SDK deps), then SBOM
          # it. cyclonedx-py runs from the runner python, kept out of the scanned
          # environment.
          python -m venv /tmp/sdkenv
          /tmp/sdkenv/bin/pip install --quiet dist/*.whl
          /tmp/sdkenv/bin/pip uninstall --quiet -y pip setuptools wheel || true
          python -m pip install --quiet cyclonedx-bom
          cyclonedx-py environment /tmp/sdkenv/bin/python --of JSON --sv 1.6 \
            -o "kbm_ledsas_sdk-${VERSION}.cdx.json"
      - name: Upload SBOM to the Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "kbm_ledsas_sdk-${TAG#v}.cdx.json" --clobber --repo "${{ github.repository }}"
